<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ===== OPENING LUXURY ===== */
.opening{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  overflow:hidden;
}

.overlay{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9));
}

.opening-box{
  text-align:center;
  color:#fff;
  z-index:2;
  animation:fadeZoom 2s ease;
}

.kepada{
  letter-spacing:4px;
  font-size:13px;
  opacity:.7;
}

/* GOLD TEXT */
.gold-text{
  font-size:34px;
  margin:10px 0 25px;
  font-weight:600;
  background:linear-gradient(90deg,#c9a96a,#fff3c4,#c9a96a);
  background-size:200% auto;
  color:transparent;
  -webkit-background-clip:text;
  animation:shine 3s linear infinite;
}

.open-btn{
  padding:14px 34px;
  border-radius:999px;
  border:0;
  background:linear-gradient(45deg,#c9a96a,#e6c989);
  color:#000;
  font-weight:600;
  cursor:pointer;
}

/* ANIMATION */
@keyframes shine{
  to{ background-position:200% center; }
}
@keyframes fadeZoom{
  from{opacity:0; transform:scale(1.1);}
  to{opacity:1; transform:scale(1);}
}

/* ===== WRAPPER ===== */
.wrapper{
  filter:blur(20px);
  transition:1.5s;
}
.wrapper.show{
  filter:blur(0);
}

/* ===== SLIDE ===== */
.slide{
  min-height:110vh;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:scale(1.05);
  transition:1.5s;
  position:relative;
}

.slide img{
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.slide.show{
  opacity:1;
  transform:scale(1);
}

/* ===== NAMA TAMU ===== */
.guest{
  position:absolute;
  bottom:22%;
  width:100%;
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:#333;
  opacity:0;
  transition:1.5s;
}
.guest.show{
  opacity:1;
}

/* ===== BUTTON LOKASI ===== */
.location-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 26px;
  border-radius:14px;
  background:#2c3e2f;
  color:#fff;
  text-decoration:none;
}

/* ===== FLOWER ===== */
.flower{
  position:fixed;
  top:-40px;
  width:10px;
  height:10px;
  background:radial-gradient(circle,#e6c989,transparent);
  opacity:.5;
  animation:fall linear infinite;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="opening">
  <div class="overlay"></div>

  <div class="opening-box">
    <p class="kepada">Kepada Yth.</p>
    <h1 id="guestDisplay" class="gold-text"></h1>

    <button class="open-btn" onclick="start()">
      Buka Undangan
    </button>
  </div>
</div>

<div class="wrapper" id="wrapper">

<div class="slide">
  <img src="1.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+1'">
</div>

<div class="slide">
  <img src="2.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+2'">
  <div class="guest" id="guestName"></div>
</div>

<div class="slide">
  <img src="3.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+3'">
</div>

<div class="slide">
  <img src="4.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+4'">
  <a class="location-btn"
     href="https://maps.app.goo.gl/nVPUV6W1P7WzZBEG8"
     target="_blank">
     📍 Lihat Lokasi
  </a>
</div>

</div>

<audio id="music" loop>
  <source src="wedding-song.mp3">
</audio>

<script>
// ===== NAMA TAMU =====
const params = new URLSearchParams(window.location.search);
const guest = params.get("to") || "Tamu Undangan";

document.getElementById("guestDisplay").innerText = guest;
document.getElementById("guestName").innerText = guest;

// ===== START =====
function start(){
  const opening = document.getElementById("opening");

  opening.style.opacity = "0";

  setTimeout(()=>{
    opening.style.display="none";
    document.getElementById("wrapper").classList.add("show");
    fadeMusic();
    showSlides();
  },1000);
}

// ===== MUSIC =====
function fadeMusic(){
  const audio=document.getElementById("music");
  audio.volume=0;
  audio.play().catch(()=>{});
  let vol=0;

  const fade=setInterval(()=>{
    if(vol<1){
      vol+=0.05;
      audio.volume=vol;
    } else clearInterval(fade);
  },200);
}

// ===== SHOW FIRST =====
function showSlides(){
  document.querySelectorAll('.slide')[0].classList.add('show');
}

// ===== SCROLL =====
window.addEventListener('scroll',()=>{
  document.querySelectorAll('.slide').forEach(s=>{
    if(s.getBoundingClientRect().top < window.innerHeight-100){
      s.classList.add('show');
      let g=s.querySelector('.guest');
      if(g) g.classList.add('show');
    }
  });
});

// ===== FLOWER =====
for(let i=0;i<20;i++){
  let f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(6+Math.random()*5)+"s";
  document.body.appendChild(f);
}
</script>

</body>
</html>
