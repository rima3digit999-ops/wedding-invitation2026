<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ===== ENVELOPE OPENING ===== */
.opening{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.envelope{
  width:220px;
  height:140px;
  background:#f3efe9;
  position:relative;
  cursor:pointer;
  box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#e5dfd6;
  transform-origin:top;
  transition:1s;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

/* ===== BLUR TRANSITION ===== */
.wrapper{
  filter:blur(20px);
  transition:1.5s;
}
.wrapper.show{
  filter:blur(0);
}

/* ===== SLIDE ===== */
.slide{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:scale(1.05);
  transition:1.5s;
  position:relative;
}
.slide img{
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.slide.show{
  opacity:1;
  transform:scale(1);
}

/* ===== GUEST NAME ===== */
.guest{
  position:absolute;
  bottom:22%;
  width:100%;
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:#333;
  opacity:0;
  transition:1.5s;
}
.guest.show{
  opacity:1;
}

/* ===== BUTTON ===== */
.location-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 26px;
  border-radius:14px;
  background:#2c3e2f;
  color:#fff;
  text-decoration:none;
}

/* ===== FLOWER ===== */
.flower{
  position:fixed;
  top:-40px;
  width:12px;
  height:12px;
  background:radial-gradient(circle,#e6c989,transparent);
  opacity:.6;
  animation:fall linear infinite;
}
@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" onclick="start()">
  <div class="envelope" id="env">
    <div class="flap"></div>
  </div>
</div>

<div class="wrapper" id="wrapper">

<!-- SLIDES -->
<div class="slide"><img src="1.png"></div>

<div class="slide">
  <img src="2.png">
  <div class="guest" id="guestName"></div>
</div>

<div class="slide"><img src="3.png"></div>

<div class="slide">
  <img src="4.png">
  <a class="location-btn"
     href="https://maps.app.goo.gl/nVPUV6W1P7WzZBEG8"
     target="_blank">
     📍 Lihat Lokasi
  </a>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="wedding-song.mp3">
</audio>

<script>
// ===== GUEST =====
const params = new URLSearchParams(location.search);
const guest = params.get("to") || "Tamu Undangan";
document.getElementById("guestName").innerText = guest;

// ===== START =====
function start(){
  document.getElementById("env").classList.add("open");

  setTimeout(()=>{
    document.querySelector(".opening").style.display="none";
    document.getElementById("wrapper").classList.add("show");
    fadeMusic();
  },800);
}

// ===== MUSIC FADE IN =====
function fadeMusic(){
  let audio=document.getElementById("music");
  audio.volume=0;
  audio.play();
  let i=setInterval(()=>{
    if(audio.volume<1){
      audio.volume+=0.05;
    } else clearInterval(i);
  },200);
}

// ===== SCROLL =====
const slides=document.querySelectorAll('.slide');
window.addEventListener('scroll',()=>{
  slides.forEach(s=>{
    if(s.getBoundingClientRect().top < window.innerHeight-100){
      s.classList.add('show');
      let g=s.querySelector('.guest');
      if(g) g.classList.add('show');
    }
  });
});

// ===== FLOWER =====
for(let i=0;i<25;i++){
  let f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(f);
}
</script>

</body>
</html>
