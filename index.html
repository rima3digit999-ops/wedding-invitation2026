<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ===== OPENING ===== */
.opening{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  cursor:pointer;
}

.envelope{
  width:220px;
  height:140px;
  background:#f3efe9;
  position:relative;
  box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#e5dfd6;
  transform-origin:top;
  transition:1s;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

/* ===== WRAPPER ===== */
.wrapper{
  filter:blur(20px);
  transition:1.5s;
}
.wrapper.show{
  filter:blur(0);
}

/* ===== SLIDES ===== */
.slide{
  min-height:110vh;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:scale(1.05);
  transition:1.5s;
  position:relative;
}

.slide img{
  width:100%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.slide.show{
  opacity:1;
  transform:scale(1);
}

/* ===== NAMA TAMU ===== */
.guest{
  position:absolute;
  bottom:22%;
  width:100%;
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:#333;
  opacity:0;
  transition:1.5s;
}

.guest.show{
  opacity:1;
}

/* ===== BUTTON ===== */
.location-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 26px;
  border-radius:14px;
  background:#2c3e2f;
  color:#fff;
  text-decoration:none;
  font-weight:600;
}

/* ===== FLOWER ===== */
.flower{
  position:fixed;
  top:-40px;
  width:12px;
  height:12px;
  background:radial-gradient(circle,#e6c989,transparent);
  opacity:.6;
  animation:fall linear infinite;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" onclick="start()">
  <div class="envelope" id="env">
    <div class="flap"></div>
  </div>
</div>

<div class="wrapper" id="wrapper">

<!-- SLIDES -->
<div class="slide"><img src="1.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+1'"></div>

<div class="slide">
  <img src="2.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+2'">
  <div class="guest" id="guestName"></div>
</div>

<div class="slide"><img src="3.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+3'"></div>

<div class="slide">
  <img src="4.png" onerror="this.src='https://via.placeholder.com/400x700?text=Slide+4'">
  <a class="location-btn"
     href="https://maps.app.goo.gl/nVPUV6W1P7WzZBEG8"
     target="_blank">
     📍 Lihat Lokasi
  </a>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// ===== AMBIL NAMA TAMU =====
const params = new URLSearchParams(window.location.search);
const guest = params.get("to") || "Tamu Undangan";
document.getElementById("guestName").innerText = guest;

// ===== START OPENING =====
function start(){
  document.getElementById("env").classList.add("open");

  setTimeout(()=>{
    document.querySelector(".opening").style.display="none";
    document.getElementById("wrapper").classList.add("show");
    fadeMusic();
    showSlides();
  },800);
}

// ===== MUSIC FADE =====
function fadeMusic(){
  const audio = document.getElementById("music");
  audio.volume = 0;
  audio.play().catch(()=>{});
  let vol = 0;
  const fade = setInterval(()=>{
    if(vol < 1){
      vol += 0.05;
      audio.volume = vol;
    } else clearInterval(fade);
  },200);
}

// ===== TAMPILKAN SLIDE AWAL =====
function showSlides(){
  document.querySelectorAll('.slide')[0].classList.add('show');
}

// ===== SCROLL ANIMATION =====
window.addEventListener('scroll', ()=>{
  document.querySelectorAll('.slide').forEach(slide=>{
    if(slide.getBoundingClientRect().top < window.innerHeight - 100){
      slide.classList.add('show');
      const g = slide.querySelector('.guest');
      if(g) g.classList.add('show');
    }
  });
});

// ===== FLOWER EFFECT =====
for(let i=0;i<25;i++){
  const f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(f);
}

// ===== AUTO BYPASS kalau opening gagal =====
setTimeout(()=>{
  document.querySelector(".opening").style.display="none";
  document.getElementById("wrapper").classList.add("show");
  showSlides();
},4000);
</script>

</body>
</html>
